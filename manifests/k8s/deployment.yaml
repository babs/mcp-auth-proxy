apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-auth-proxy
  namespace: mcp-auth-proxy
  labels:
    app.kubernetes.io/name: mcp-auth-proxy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mcp-auth-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Never go below full capacity during a rolling deploy.
      # This protects against cutting in-flight MCP/SSE sessions.
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mcp-auth-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Must EXCEED SHUTDOWN_TIMEOUT so the proxy's shutdown envelope
      # (srv.Shutdown up to SHUTDOWN_TIMEOUT, +5s inFlight grace, +Redis
      # close) completes before kubelet sends SIGKILL. With
      # SHUTDOWN_TIMEOUT=120s the envelope is ~125s; 150s leaves a safe
      # 25s margin for Redis close + logger flush. Setting this to 120s
      # would kill the pod exactly when shutdown starts its grace phase.
      terminationGracePeriodSeconds: 150

      securityContext:
        runAsNonRoot: true
        # distroless/static-debian13:nonroot declares USER as the *name*
        # `nonroot`, not a UID. kubelet's runAsNonRoot check rejects named
        # users with: "image has non-numeric user (nonroot), cannot
        # verify user is non-root". Pin the numeric UID/GID (65532 is
        # the distroless nonroot) so the check passes.
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: mcp-auth-proxy
          # TODO: replace with your published image (e.g. ghcr.io/babs/mcp-auth-proxy:v1.0.0)
          image: ghcr.io/babs/mcp-auth-proxy:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          envFrom:
            - secretRef:
                name: mcp-auth-proxy-secret
            - configMapRef:
                name: mcp-auth-proxy-config

          # Readiness: drops the pod from the Service endpoint list while
          # the proxy cannot reach Redis (when REDIS_URL set). /readyz is
          # bound to the metrics listener only — exposing it on the public
          # port would turn every anonymous probe into a Redis-DoS
          # amplifier (see main.go readyzHandler doc comment).
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Liveness: restarts the pod if the process hangs.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
