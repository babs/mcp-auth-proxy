# Secret — security-critical values.
# DO NOT commit a filled-in version of this file to source control.
#
# Usage:
#   cp secret.example.yaml secret.yaml
#   # Edit secret.yaml and fill in the base64-encoded values:
#   echo -n 'YOUR_VALUE' | base64
#   kubectl apply -f secret.yaml -n mcp-auth-proxy
#
# TOKEN_SIGNING_SECRET must be byte-identical across ALL replica pods.
# A mismatch silently breaks every cross-pod token validation.
# Generate with:  bash manifests/scripts/generate-signing-secret.sh | base64
apiVersion: v1
kind: Secret
metadata:
  name: mcp-auth-proxy-secret
  namespace: mcp-auth-proxy
  labels:
    app.kubernetes.io/name: mcp-auth-proxy
type: Opaque
stringData:
  # TODO: fill in — minimum 32 bytes; generate with generate-signing-secret.sh
  TOKEN_SIGNING_SECRET: ""

  # TODO: fill in — client secret from your OIDC IdP (Keycloak, Entra, Auth0…)
  OIDC_CLIENT_SECRET: ""
