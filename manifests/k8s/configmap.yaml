apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-auth-proxy-config
  namespace: mcp-auth-proxy
  labels:
    app.kubernetes.io/name: mcp-auth-proxy
data:
  # TODO: fill in — OIDC discovery base URL (no trailing slash).
  # Examples:
  #   Keycloak:    https://keycloak.example.com/realms/myrealm
  #   Entra ID:    https://login.microsoftonline.com/{tenant}/v2.0
  #   Auth0:       https://your-tenant.auth0.com
  OIDC_ISSUER_URL: ""

  # TODO: fill in — client ID registered with the IdP.
  OIDC_CLIENT_ID: ""

  # TODO: fill in — public URL this proxy is reachable at by MCP clients.
  # Must match the hostname in your Ingress TLS cert.
  PROXY_BASE_URL: ""

  # TODO: fill in — upstream MCP URL. Path is mandatory and is used
  # verbatim as both the proxy's public mount AND the path forwarded
  # upstream. Example: http://mcp-server:8000/mcp (proxy exposes /mcp,
  # upstream serves /mcp), or http://mcp-server:8000/api/v1/mcp.
  # Query, fragment, userinfo, and origin-only URLs are rejected at
  # startup.
  UPSTREAM_MCP_URL: ""

  # Redis replay store.
  # Single-use codes and refresh-token reuse detection (OAuth 2.1 §6.1).
  # Override REDIS_KEY_PREFIX when sharing a Redis instance across deployments.
  REDIS_URL: "redis://redis:6379/0"
  REDIS_REQUIRED: "true"
  REDIS_KEY_PREFIX: "mcp-auth-proxy:"

  LISTEN_ADDR: ":8080"
  # Bind metrics + /readyz on all interfaces inside the pod so an
  # in-cluster Prometheus scraper on a different pod IP can poll the
  # `/metrics` endpoint (prometheus.io/scrape annotation on the pod
  # already advertises it). /readyz is unauthenticated on this port;
  # gate access with a NetworkPolicy that allows only the scraper's
  # namespace/pod selector. The code default is loopback
  # (127.0.0.1:9090) for bare-metal / hostNetwork; this override is
  # correct for standard in-cluster deployment.
  METRICS_ADDR: ":9090"
  LOG_LEVEL: "info"
  PKCE_REQUIRED: "true"
  RATE_LIMIT_ENABLED: "true"
  # Graceful shutdown — must be STRICTLY LESS than
  # terminationGracePeriodSeconds in the Deployment (we add ~5s inFlight
  # grace + Redis-close envelope on top).
  SHUTDOWN_TIMEOUT: "120s"
  GROUPS_CLAIM: "groups"
  # ALLOWED_GROUPS: "admin,mcp-users"   # uncomment to restrict access
  # REVOKE_BEFORE: ""                    # RFC3339 bulk-revocation cutoff
  COMPAT_ALLOW_STATELESS: "false"
  # Access-log path filter (public listener only). Go RE2 regexp matched
  # against r.URL.Path; matches are dropped from the access log. Handler
  # response, Prometheus counters, and panic recovery are unaffected.
  # Invalid pattern fails startup. /readyz and /metrics live on
  # METRICS_ADDR and do not reach this middleware. ALWAYS anchor with
  # ^…$ — unanchored "healthz" also matches /mcp/healthz-tool, and
  # ".*" silences the entire access log. Uncomment to silence
  # liveness-probe noise on /healthz.
  # ACCESS_LOG_SKIP_RE: "^/healthz$"
