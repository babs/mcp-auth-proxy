# PodDisruptionBudget — keeps ≥2 replicas available during voluntary
# disruptions so a single node drain cannot take the auth plane below
# quorum. With replicas=3 this still permits one pod to be drained at
# a time (rolling deploys continue to work via maxSurge=1 in the
# Deployment). Raise to minAvailable=N-1 if you run more replicas.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mcp-auth-proxy
  namespace: mcp-auth-proxy
  labels:
    app.kubernetes.io/name: mcp-auth-proxy
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mcp-auth-proxy
