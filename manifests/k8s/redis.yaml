# Redis — single-replica demo deployment.
#
# WARNING: NOT production-ready.
# - No persistence (--save "" --appendonly no)
# - No authentication
# - No TLS
# - Single replica (no HA, no Sentinel/Cluster)
#
# For production: use a managed Redis service (Elasticache, Cloud Memorystore,
# Azure Cache for Redis) or a Redis Operator (e.g. redis-operator, Opstree).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mcp-auth-proxy
  labels:
    app: redis
    app.kubernetes.io/name: mcp-auth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mcp-auth-proxy
  labels:
    app.kubernetes.io/name: mcp-auth-proxy
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
