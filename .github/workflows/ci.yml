name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          args: --timeout=5m

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: static build
        env:
          CGO_ENABLED: '0'
        # Build the root `main` package only. `./...` enumerates every
        # package in the module; paired with `-o <file>` it fails with
        # "cannot write multiple packages to non-directory".
        run: go build -ldflags="-s -w" -o /tmp/mcp-auth-proxy ./

  fuzz-smoke:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: fuzz OpenJSON (20s)
        run: go test -run=^$ -fuzz=FuzzOpenJSON -fuzztime=20s ./token/

      - name: fuzz Validate (20s)
        run: go test -run=^$ -fuzz=FuzzValidate -fuzztime=20s ./token/
