version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - noctx
    - revive
    - unconvert
  settings:
    gosec:
      excludes:
        - G104  # errcheck dupe
        # G115 false positive: term.IsTerminal requires int(os.Stdout.Fd())
        # where Fd() returns uintptr. The int() cast is unavoidable per the
        # golang.org/x/term API. Scoped below to that single call site.
        - G115
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      # noctx flags httptest.NewRequest in _test.go files, but httptest
      # requests are fed directly to a handler — no outbound network call,
      # so a context adds no cancellation/timeout value. Use
      # NewRequestWithContext only where the test actually wants to assert
      # ctx propagation.
      - path: _test\.go
        linters:
          - noctx
      # Tests routinely ignore errors from rr.Body.Close(), json.Encode
      # into an httptest.ResponseRecorder, and fmt.Fprintf into an in-memory
      # writer — none of which can fail in a meaningful way. Suppress the
      # whole class rather than sprinkling `_ =` noise through the suite.
      - path: _test\.go
        linters:
          - errcheck
      # Test files use throwaway OAuth endpoint URLs ("https://idp.example.com/token")
      # that gosec's G101 flags as hardcoded credentials. They are not.
      - path: _test\.go
        linters:
          - gosec
      # gosec G120 fires on r.FormValue() because form parsing reads the
      # request body without a size cap of its own. The token handler wraps
      # r.Body in http.MaxBytesReader(w, r.Body, maxBodySize) at entry
      # (handlers/helpers.go:119) before FormValue is ever called, so the
      # body is capped. gosec can't see that path.
      - path: handlers/token\.go
        linters:
          - gosec
        text: "G120"

run:
  timeout: 5m
