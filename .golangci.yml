version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - noctx
    - revive
    - unconvert
  settings:
    gosec:
      excludes:
        - G104  # errcheck dupe
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      # noctx flags httptest.NewRequest in _test.go files, but httptest
      # requests are fed directly to a handler — no outbound network call,
      # so a context adds no cancellation/timeout value. Use
      # NewRequestWithContext only where the test actually wants to assert
      # ctx propagation.
      - path: _test\.go
        linters:
          - noctx

run:
  timeout: 5m
